name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all tools present
        run: |
          test -f tools/shared.js
          test -f index.html
          ls tools/*.html | wc -l
